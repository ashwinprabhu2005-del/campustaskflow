{% extends 'base.html' %}

{% block title %}Add Task - CampusTaskFlow Pro{% endblock %}

{% block content %}
<div class="container fade-in-scroll d-flex justify-content-center">
    <div class="glass-card p-5 w-100" style="max-width: 600px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white">Create a New Task</h2>
            <p class="text-white-50">Fill out the details below to add a new task to your dashboard.</p>
        </div>
        
        <form method="POST" class="task-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-electric btn-lg shadow-electric">Save Task</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
