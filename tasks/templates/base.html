<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CampusTaskFlow Pro{% endblock %}</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-charcoal text-white">

    <!-- Premium Glassmorphism Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold text-electric" href="{% url 'home' %}">
                CampusTaskFlow<span class="text-white">Pro</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link text-white-50 p-btn-hover" href="{% url 'home' %}">Home</a></li>
                    {% if user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link text-white-50 p-btn-hover" href="{% url 'dashboard' %}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50 p-btn-hover" href="{% url 'task_list' %}">My Tasks</a></li>
                    <li class="nav-item"><a class="nav-link text-white-50 p-btn-hover" href="{% url 'profile' %}">Profile</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-outline-light rounded-pill px-4" href="{% url 'logout' %}">Logout</a></li>
                    {% else %}
                    <li class="nav-item ms-lg-3"><a class="btn btn-link text-white text-decoration-none" href="{% url 'login' %}">Login</a></li>
                    <li class="nav-item"><a class="btn btn-electric rounded-pill px-4 text-white fw-semibold shadow-electric" href="{% url 'register' %}">Get Started</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-5 text-center text-white-50 border-top border-secondary mt-5">
        <div class="container">
            <p class="mb-0">© 2026 CampusTaskFlow Pro. Designed for peak productivity.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
